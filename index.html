ii<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>

    <!-- Linking external CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="box">
        <h1> GENERATE YOUR <br> <span>RANDOM PASSWORD </span></h1>

        <input type="number" id="length" placeholder="Enter Length (By Default:8)"><br>
        
        <p id="result"></p>
        <button id="opy" onclick="copyPassword()">Copy</button>
        <p id="strengthText"></p>

        <label><input type="checkbox" id="upper" checked>Uppercase</label><br>
        <label><input type="checkbox" id="lower">Lowercase</label><br>
        <label><input type="checkbox" id="numbers">Numbers</label><br>
        <label><input type="checkbox" id="symbols">Symbols</label><br>
        <button class="gene" onclick="generatePassword()">Generate</button>
    </div>

    <script>
        function copyPassword() {
            let passwordField = document.getElementById("result");
            let password=passwordField.innerText;
            if (password===""){
                alert("No password");
                return;
            }
            navigator.clipboard.writeText(password);
            alert("Password Copied");
}

        function generatePassword() {

            let length = document.getElementById("length").value;
            

            if (length === "" || length <= 0) {
                length = 8;  
}

            let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let lower = "abcdefghijklmnopqrstuvwxyz";
            let numbers = "0123456789";
            let symbols = "!@#$%^&*";

            let characters = "";

            if (document.getElementById("upper").checked) {
                characters += upper;
            }

            if (document.getElementById("lower").checked) {
                characters += lower;
            }

            if (document.getElementById("numbers").checked) {
                characters += numbers;
            }

            if (document.getElementById("symbols").checked) {
                characters += symbols;
            }

            if (characters === "") {
                document.getElementById("result").innerText = "Please select at least one option!";
                document.getElementById("result").style.display="block";
                document.getElementById("strengthText").style.display='none';
                return;
            }

            let password = "";

            for (let i = 0; i < length; i++) {
                let randomIndex = Math.floor(Math.random() * characters.length);
                password += characters[randomIndex];
            }

            document.getElementById("result").innerText = password;
            document.getElementById("result").style.display="block";
            document.getElementById("strengthText").style.display='block';
            document.getElementById("opy").style.display='block';
            let strength = "Weak";

            if (password.length >= 8 &&
                /[A-Z]/.test(password) &&
                /[0-9]/.test(password) &&
                /[!@#$%^&*]/.test(password)) {
                strength = "Strong";
                }else if (password.length >= 6) {
                    strength = "Medium";
                    }else if(/"Please select at least one option!"/.test(password)){
                        strength = " ";
                    }

document.getElementById("strengthText").innerText = "Strength: " + strength;
        }
    </script>

</body>
</html>
